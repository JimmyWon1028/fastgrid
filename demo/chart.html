<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FabUI Chart Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css?v=20260712-soft-palette-v1">
  <style>
    body { margin: 0; padding: 24px; background: #f3f4f6; font-family: helvetica, tahoma, verdana, sans-serif; }
    h1 { margin: 0 0 20px; font-size: 22px; }
    .charts { display: grid; grid-template-columns: repeat(2, minmax(320px, 1fr)); gap: 20px; }
    .chart-card { height: 360px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; overflow: hidden; }
    @media (max-width: 760px) { .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="fg-theme-default">
  <h1>FabUI Chart</h1>
  <main class="charts">
    <section id="columnChart" class="chart-card"></section><section id="barChart" class="chart-card"></section>
    <section id="lineChart" class="chart-card"></section><section id="pieChart" class="chart-card"></section>
  </main>
  <script src="../dist/fabui.min.js?v=20260712-chart-wijmo-v1"></script>
  <script>
    const itemsSource = [
      { month: '1月', sales: 120, expenses: 92 }, { month: '2月', sales: 145, expenses: 108 },
      { month: '3月', sales: 132, expenses: 101 }, { month: '4月', sales: 168, expenses: 119 },
      { month: '5月', sales: 175, expenses: 126 }
    ];
    const series = [{ name: '營收', binding: 'sales' }, { name: '費用', binding: 'expenses' }];
    new fabui.Chart('#columnChart', { chartType: 'Column', header: '直條圖', itemsSource, bindingX: 'month', series, locale: 'zh-TW' });
    new fabui.Chart('#barChart', { chartType: 'Bar', header: '橫條圖', itemsSource, bindingX: 'month', series, locale: 'zh-TW' });
    new fabui.Chart('#lineChart', { chartType: 'Line', header: '折線圖', itemsSource, bindingX: 'month', series, tooltip: { content: '{seriesName} · {x}: {y}' }, locale: 'zh-TW' });
    new fabui.Chart('#pieChart', {
      chartType: 'Pie', header: '圓餅圖', bindingName: 'product', binding: 'value', locale: 'zh-TW',
      itemsSource: [{ product: 'A', value: 42 }, { product: 'B', value: 35 }, { product: 'C', value: 23 }]
    });
  </script>
</body>
</html>
