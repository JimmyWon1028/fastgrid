<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fabui.Window Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 28px;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 { margin: 0 0 8px; }
    p { line-height: 1.65; }
    .demo-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px; border: 1px solid #ddd; background: #fafafa; }
    .demo-toolbar select, .demo-toolbar button { min-height: 32px; padding: 4px 10px; }
    #window-status { margin-top: 12px; color: #666; }
    .window-demo-content h2 { margin-top: 0; }
    .window-demo-grid { display: grid; grid-template-columns: 110px minmax(0, 1fr); gap: 10px; }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Window Demo</h1>
  <p>Pure JavaScript Window，預設提供最大化／還原與關閉；可選擇啟用帶動畫的收合與最小化。</p>
  <div class="demo-toolbar">
    <label for="window-theme">主題</label>
    <select id="window-theme">
      <option value="default" selected>Default</option><option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option><option value="material">Material</option>
      <option value="material-blue">Material Blue</option><option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option><option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option><option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option><option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option><option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option><option value="black">Black</option>
    </select>
    <button id="open-basic" type="button">開啟基本 Window</button>
    <button id="open-modal" type="button">開啟 Modal</button>
    <button id="center-basic" type="button">置中</button>
    <button id="maximize-basic" type="button">最大化</button>
  </div>
  <div id="window-status" aria-live="polite"></div>
  <div id="basic-window" class="window-demo-content" style="display:none">
    <h2>基本資料</h2>
    <div class="window-demo-grid">
      <strong>元件</strong><span>fabui.Window</span>
      <strong>拖曳</strong><span>拖曳標題列移動</span>
      <strong>縮放</strong><span>拖曳四邊或四角調整尺寸</span>
      <strong>標題 icon</strong><span>使用 <code>iconCls: 'icon-window'</code></span>
      <strong>預設工具</strong><span>最大化／還原、關閉</span>
      <strong>可選工具</strong><span>本視窗另啟用收合、最小化</span>
    </div>
  </div>
  <div id="modal-window" class="window-demo-content" style="display:none">
    <h2>Modal Window</h2>
    <p>開啟時會建立遮罩，Window 會自動提高 z-index。</p>
    <button id="close-modal" type="button">關閉</button>
  </div>
  <script src="../dist/fabui.min.js"></script>
  <script src="./js/window-demo.js?v=20260718-window-motion-v2"></script>
  <script>
    window.mountFabUIWindowDemo(window.fabui);
  </script>
</body>
</html>
