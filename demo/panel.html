<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Panel Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css?v=20260722-theme-css-split-v1">
  <script src="./js/theme-loader.js?v=20260722-theme-reload-v1"></script>
  <style>
    body { margin: 0; padding: 20px; background: #f5f6f8; color: #333; font: 14px Arial, sans-serif; }
    .demo-toolbar { display: flex; margin-bottom: 12px; padding: 10px; align-items: center; flex-wrap: wrap; gap: 8px; border: 1px solid #ddd; background: #fff; }
    .demo-grid { display: grid; grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr); gap: 16px; }
    .panel-content-grid { display: grid; grid-template-columns: 100px minmax(0, 1fr); gap: 10px; }
    #panel-status { min-height: 20px; margin-bottom: 10px; }
    @media (max-width: 760px) { .demo-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Panel Demo</h1>
  <p>Pure JavaScript Panel，支援 Header、Footer、Tools、狀態、垂直標題、遠端載入與 Theme。</p>
  <div class="demo-toolbar">
    <label for="panel-theme">主題</label>
    <select id="panel-theme">
      <option value="default" selected>Default</option><option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option><option value="material">Material</option>
      <option value="material-blue">Material Blue</option><option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option><option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option><option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option><option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option><option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option><option value="black">Black</option><option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <a id="open-panel" href="javascript:void(0)">開啟</a>
    <a id="close-panel" href="javascript:void(0)">關閉</a>
    <a id="toggle-panel" href="javascript:void(0)">收合／展開</a>
    <a id="restore-panel" href="javascript:void(0)">還原</a>
  </div>
  <div id="panel-status" aria-live="polite"></div>
  <div class="demo-grid">
    <div id="basic-panel" style="display:none">
      <h2>Panel 內容</h2>
      <div class="panel-content-grid">
        <strong>元件</strong><span>fabui.Panel</span>
        <strong>工具</strong><span>自訂、收合、最小化、最大化、關閉</span>
        <strong>尺寸</strong><span>支援 auto、px、百分比與 fit</span>
        <strong>資料</strong><span>支援 content、href、loader 與 cache</span>
      </div>
    </div>
    <div id="vertical-panel" style="display:none"><p>使用 <code>halign: 'left'</code> 顯示垂直標題。</p></div>
  </div>
  <script src="../dist/fabui.min.js"></script>
  <script src="./js/panel-demo.js?v=20260721-mono-variants-v1"></script>
  <script>window.mountFabUIPanelDemo(window.fabui);</script>
  <script type="module" src="./js/dist-controls.js?v=20260721-mono-variants-v1"></script>
</body>
</html>
