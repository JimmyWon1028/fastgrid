<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FabGrid Dev Grid Demo</title>
    <link rel="stylesheet" href="../src/fabui.css?v=20260719-i18n-theme-audit-v1" />
    <link
      rel="stylesheet"
      href="./style/my.icon.css?v=20260713-demo-style-folder-v1"
    />
    <link
      rel="stylesheet"
      href="./style/style.css?v=20260719-style-isolation-v1"
    />
    <link
      rel="stylesheet"
      href="./style/grid2.css?v=20260719-toolbar-icon-only-v1"
    />
  </head>
  <body
    class="fg-theme-default grid2-demo"
    data-grid-toolbar-icon-only="true"
  >
    <main class="page">
      <section data-fabgrid-demo-toolbar></section>

      <section class="stats" aria-label="FabGrid stats">
        <span id="rowCount">Rows: -</span>
        <span id="rowRange">Rows visible: -</span>
        <span id="columnRange">Columns visible: -</span>
        <span id="cellCount">Rendered cells: -</span>
      </section>

      <section class="grid-shell">
        <div id="grid"></div>
        <div class="demo-filter-bar" aria-label="Demo filter">
          <span id="demoResultCount" class="demo-result-count">筆數: -</span>
          <label class="demo-filter-control">
            <span id="demoFilterLabel">篩選:</span>
            <span class="demo-filter-input-wrap">
              <input
                id="demoFilterInput"
                type="search"
                placeholder="輸入條件"
                autocomplete="off"
              />
              <a data-fabui-button href="javascript:void(0)"
                id="demoFilterMode"
                class="demo-filter-mode"
                aria-label="OR"
                title="OR"
              >
                OR
              </a>
              <a data-fabui-button href="javascript:void(0)"
                id="demoFilterClear"
                aria-label="清除篩選"
                title="清除篩選"
              >
                🧹
              </a>
            </span>
          </label>
        </div>
      </section>
    </main>

    <script src="./js/grid-toolbar.js?v=20260719-toolbar-icon-only-v1"></script>
    <script src="./js/grid-data.js?v=20260715-remove-currency-v1"></script>
    <script src="./js/grid-locales.js?v=20260716-filtering-toggle-v1"></script>
    <script src="./js/grid-query.js?v=20260715-grid-names-v1"></script>
    <script type="module">
      import fabui from "../src/fabui.js?v=20260719-button-anchor-v1";
      import { createGrid2FabuiDemo } from "./js/grid2-components.js?v=20260719-demo-parity-v2";

      window.fabui = fabui;
      await import(
        "../src/locales/fabgrid-locale.zh-TW.js?v=20260719-current-month-text-v1"
      );
      await import(
        "../src/locales/fabgrid-locale.zh-CN.js?v=20260719-current-month-text-v1"
      );
      await import(
        "../src/locales/fabgrid-locale.en.js?v=20260719-current-month-text-v1"
      );

      const grid2Components = createGrid2FabuiDemo(fabui);
      await import("./js/grid.js?v=20260719-toolbar-icon-only-v1");
      grid2Components.complete();
    </script>
    <script type="module" src="./js/dev-controls.js?v=20260719-button-icon-v1"></script>
</body>
</html>
