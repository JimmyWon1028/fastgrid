<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.SwitchButton Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css?v=20260721-mono-theme-v3">
  <style>
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      background: var(--fg-cell-bg, #fff);
      color: var(--fg-cell-text, #333);
      font: 14px Arial, sans-serif;
    }
    h1 { margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; font-size: 18px; }
    .demo-toolbar,
    .switchbutton-row,
    .switchbutton-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }
    .demo-toolbar {
      gap: 8px;
      margin: 18px 0;
      padding: 12px;
      border: 1px solid var(--fg-border, #ddd);
      background: var(--fg-header-bg, #fafafa);
    }
    .switchbutton-panel {
      max-width: 680px;
      padding: 18px;
      border: 1px solid var(--fg-border, #ddd);
      background: var(--fg-cell-bg, #fff);
    }
    .switchbutton-column { display: grid; gap: 14px; }
    #switchbutton-status {
      min-height: 20px;
      margin: 12px 0;
      color: var(--fg-muted-text, #666);
    }
    .switchbutton-actions { margin-top: 16px; gap: 8px; }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.SwitchButton Demo</h1>
  <p>參考 jQuery EasyUI SwitchButton，主題顏色與形狀逐一對應本機 <code>res/themes/*/switchbutton.css</code>。</p>
  <div class="demo-toolbar">
    <label for="switchbutton-theme">主題</label>
    <select id="switchbutton-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
      <option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <label for="switchbutton-locale">語系</label>
    <select id="switchbutton-locale">
      <option value="zh-TW" selected>繁體中文</option>
      <option value="zh-CN">簡體中文</option>
      <option value="en">English</option>
    </select>
  </div>
  <div id="switchbutton-status" aria-live="polite"></div>

  <form id="switchbutton-form">
    <h2>Basic／Form Values</h2>
    <div class="switchbutton-panel switchbutton-column">
      <input id="switch-mail" type="checkbox" name="service">
      <input id="switch-network" type="checkbox" name="service">
      <input id="switch-subscribe" type="checkbox" name="service">
      <div class="switchbutton-actions">
        <a data-button-type="submit" href="javascript:void(0)">送出表單</a>
        <a id="switchbutton-reset" href="javascript:void(0)">Reset</a>
      </div>
    </div>

    <h2>Text／Reversed／Label</h2>
    <div class="switchbutton-panel switchbutton-row">
      <input id="switch-custom" type="checkbox">
      <input id="switch-reversed" type="checkbox">
      <input id="switch-after" type="checkbox">
      <input id="switch-top" type="checkbox">
    </div>

    <h2>Size／State／Runtime API</h2>
    <div class="switchbutton-panel">
      <div class="switchbutton-row">
        <input id="switch-large" type="checkbox">
        <input id="switch-disabled" type="checkbox">
        <input id="switch-readonly" type="checkbox">
        <input id="switch-dynamic" type="checkbox">
      </div>
      <div class="switchbutton-actions">
        <a id="switchbutton-toggle" href="javascript:void(0)">Check／Uncheck</a>
        <a id="switchbutton-enable" href="javascript:void(0)">Enable／Disable</a>
        <a id="switchbutton-readonly-toggle" href="javascript:void(0)">Readonly</a>
      </div>
    </div>
  </form>

  <script src="../dist/fabui.min.js"></script>
  <script src="./js/switchbutton-demo.js"></script>
  <script>
    window.mountFabUISwitchButtonDemo(window.fabui);
  </script>
  <script type="module" src="./js/dist-controls.js?v=20260721-mono-variants-v1"></script>
</body>
</html>
