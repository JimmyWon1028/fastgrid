<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FabGrid TreeGrid Build Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css?v=20260721-mono-theme-v3">
  <link rel="stylesheet" href="./style/treegrid.css?v=20260717-tree-context-menu-core-v1">
</head>
<body class="fg-theme-default">
  <main class="tree-page">
    <header class="tree-header">
      <div>
        <h1>FabGrid TreeGrid</h1>
        <p>以 childItemsPath 顯示三層組織資料，維持固定列高與雙向 virtualization。</p>
      </div>
      <div class="tree-actions">
        <label class="tree-control tree-toggle">
          <input id="treeSearchRowToggle" type="checkbox" checked>
          <span>搜尋列</span>
        </label>
        <label class="tree-control">
          <span>列號</span>
          <select id="treeRowHeaderMode">
            <option value="false">關閉</option>
            <option value="true" selected>顯示列號</option>
            <option value="cell">只顯示 cell</option>
          </select>
        </label>
        <a id="collapseTree" href="javascript:void(0)">全部收合</a>
        <a id="expandTree" href="javascript:void(0)">全部展開</a>
      </div>
    </header>

    <section class="tree-card">
      <div id="treeGrid"></div>
      <div class="tree-footer">
        <div class="tree-status">
          <span id="treeRowCount">目前可視節點：-</span>
          <span id="treeLastAction">準備中</span>
        </div>
        <label class="tree-filter-control">
          <span>篩選:</span>
          <span class="tree-filter-input-wrap">
            <input
              id="treeQuickSearch"
              type="search"
              placeholder="逗號分隔條件，例如 團隊,啟用"
              autocomplete="off"
            >
            <a
              id="treeQuickSearchMode"
              class="tree-filter-mode"
              aria-label="OR"
              title="OR"
             href="javascript:void(0)">OR</a>
            <a
              id="treeQuickSearchClear"
              aria-label="清除篩選"
              title="清除篩選"
             href="javascript:void(0)">🧹</a>
          </span>
        </label>
      </div>
    </section>
    <p class="tree-note">可點擊節點箭頭收合／展開；可在樹欄任一資料 cell 按滑鼠右鍵切換全部展開／全部疊合；聚焦樹欄後也可使用鍵盤左右方向鍵操作。</p>
  </main>

  <script src="../dist/fabui.min.js?v=20260721-mono-theme-v2"></script>
  <script src="./js/treegrid-data.js?v=20260721-mono-variants-v1"></script>
  <script src="./js/treegrid.js?v=20260721-mono-variants-v1"></script>
  <script type="module" src="./js/dist-controls.js?v=20260721-mono-variants-v1"></script>
</body>
</html>
