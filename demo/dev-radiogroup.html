<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.RadioGroup 開發版 Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260721-initial-filter-rules-v1">
  <style>
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      background: var(--fg-cell-bg, #fff);
      color: var(--fg-cell-text, #333);
      font: 14px Arial, sans-serif;
    }
    h1 { margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; font-size: 18px; }
    .demo-toolbar,
    .radiogroup-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .demo-toolbar {
      margin: 18px 0;
      padding: 12px;
      border: 1px solid var(--fg-border, #ddd);
      background: var(--fg-header-bg, #fafafa);
    }
    .radiogroup-panel {
      max-width: 620px;
      padding: 16px;
      border: 1px solid var(--fg-border, #ddd);
      background: var(--fg-cell-bg, #fff);
    }
    #radiogroup-status {
      min-height: 20px;
      margin: 12px 0;
      color: var(--fg-muted-text, #666);
    }
    .radiogroup-actions { margin-top: 16px; }
  </style>
</head>
<body class="fg-theme-default radiogroup-demo">
  <h1>fabui.RadioGroup 開發版 Demo</h1>
  <p>參考 jQuery EasyUI RadioGroup，每個項目直接重用 fabui.RadioButton 與原生 radio 欄位。</p>
  <div class="demo-toolbar">
    <label for="radiogroup-theme">主題</label>
    <select id="radiogroup-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
      <option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <label for="radiogroup-locale">語系</label>
    <select id="radiogroup-locale">
      <option value="zh-TW" selected>繁體中文</option>
      <option value="zh-CN">簡體中文</option>
      <option value="en">English</option>
    </select>
  </div>
  <div id="radiogroup-status" aria-live="polite"></div>

  <form id="radiogroup-form">
    <h2>Horizontal</h2>
    <div class="radiogroup-panel">
      <div id="radiogroup-horizontal"></div>
    </div>

    <h2>Vertical</h2>
    <div class="radiogroup-panel">
      <div id="radiogroup-vertical"></div>
    </div>

    <h2>Label Before／Runtime API</h2>
    <div class="radiogroup-panel">
      <div id="radiogroup-runtime"></div>
      <div class="radiogroup-actions">
        <a data-fabui-button href="javascript:void(0)" id="radiogroup-next">Next</a>
        <a data-fabui-button href="javascript:void(0)" id="radiogroup-clear">Clear</a>
        <a data-fabui-button href="javascript:void(0)" id="radiogroup-reset">Reset</a>
        <a data-fabui-button href="javascript:void(0)" id="radiogroup-toggle">Enable／Disable</a>
        <a data-fabui-button href="javascript:void(0)" data-button-type="submit">檢查 FormData</a>
      </div>
    </div>
  </form>

  <script src="./js/radiogroup-demo.js?v=20260721-initial-filter-rules-v1"></script>
  <script type="module">
    import fabui from '../src/fabui.js?v=20260721-initial-filter-rules-v1';

    window.mountFabUIRadioGroupDemo(fabui);
  </script>
  <script type="module" src="./js/dev-controls.js?v=20260721-initial-filter-rules-v1"></script>
</body>
</html>
