<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Tooltip 開發版 Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260721-initial-filter-rules-v1">
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      background: #fff;
      color: #333;
      font: 14px Arial, sans-serif;
    }

    h1 { margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; font-size: 18px; }

    .demo-toolbar,
    .tooltip-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .demo-toolbar {
      margin: 18px 0;
      padding: 12px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    .tooltip-target.fui-button {
      min-width: 110px;
    }

    #tooltip-track {
      display: flex;
      width: 100%;
      height: 150px;
      align-items: center;
      justify-content: center;
      border: 1px dashed #95B8E7;
      background: #f8fbff;
    }

    #tooltip-status {
      min-height: 20px;
      margin: 12px 0;
      color: #666;
    }

    #tooltip-manual-host {
      width: max-content;
      max-width: 100%;
    }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Tooltip 開發版 Demo</h1>
  <p>Pure JavaScript Tooltip，參考 EasyUI Tooltip，支援四方向、HTML、滑鼠追蹤、延遲、手動控制、Escape、外部點擊與 FabUI theme。</p>

  <div class="demo-toolbar">
    <label for="tooltip-theme">主題</label>
    <select id="tooltip-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
      <option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
  </div>
  <div id="tooltip-status" aria-live="polite"></div>

  <h2>Basic／Position</h2>
  <div class="tooltip-row">
    <a data-fabui-button href="javascript:void(0)" id="tooltip-basic" class="tooltip-target" title="由 title attribute 建立的 Tooltip">Basic</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-top" class="tooltip-target">Top</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-bottom" class="tooltip-target">Bottom</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-left" class="tooltip-target">Left</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-right" class="tooltip-target">Right</a>
  </div>

  <h2>HTML／Click</h2>
  <div class="tooltip-row">
    <a data-fabui-button href="javascript:void(0)" id="tooltip-html" class="tooltip-target">HTML Content</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-click" class="tooltip-target">Click Tooltip</a>
  </div>

  <h2>Track Mouse</h2>
  <div id="tooltip-track" tabindex="0">將滑鼠移到這個區域</div>

  <h2>Methods</h2>
  <div id="tooltip-manual-host" class="tooltip-row">
    <a data-fabui-button href="javascript:void(0)" class="tooltip-target">Manual Target</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-show">show()</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-update">update()</a>
    <a data-fabui-button href="javascript:void(0)" id="tooltip-hide">hide()</a>
  </div>

  <script src="./js/tooltip-demo.js?v=20260721-initial-filter-rules-v1"></script>
  <script type="module">
    import fabui from '../src/fabui.js?v=20260721-initial-filter-rules-v1';

    window.mountFabUITooltipDemo(fabui);
  </script>
  <script type="module" src="./js/dev-controls.js?v=20260721-initial-filter-rules-v1"></script>
</body>
</html>
