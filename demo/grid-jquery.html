<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FabGrid jQuery Grid Demo</title>
    <link
      rel="stylesheet"
      href="../dist/fabui.css?v=20260713-jquery-wrapper-v1"
    />
    <link
      rel="stylesheet"
      href="./style/my.icon.css?v=20260713-demo-style-folder-v1"
    />
    <link
      rel="stylesheet"
      href="./style/style.css?v=20260718-drag-indicator-alpha-v1"
    />
  </head>
  <body class="fg-theme-default">
    <main class="page">
      <section
        data-fabgrid-demo-toolbar
        data-toolbar-title="FabGrid jQuery"
        data-toolbar-description="jQuery wrapper"
      ></section>

      <section class="stats" aria-label="FabGrid stats">
        <span id="rowCount">Rows: -</span>
        <span id="rowRange">Rows visible: -</span>
        <span id="columnRange">Columns visible: -</span>
        <span id="cellCount">Rendered cells: -</span>
      </section>

      <section class="grid-shell">
        <div id="grid"></div>
        <div class="demo-filter-bar" aria-label="Demo filter">
          <span id="demoResultCount" class="demo-result-count">筆數: -</span>
          <label class="demo-filter-control">
            <span id="demoFilterLabel">篩選:</span>
            <span class="demo-filter-input-wrap">
              <input
                id="demoFilterInput"
                type="search"
                placeholder="輸入條件"
                autocomplete="off"
              />
              <button
                id="demoFilterMode"
                class="demo-filter-mode"
                type="button"
                aria-label="OR"
                title="OR"
              >
                OR
              </button>
              <button
                id="demoFilterClear"
                type="button"
                aria-label="清除篩選"
                title="清除篩選"
              >
                🧹
              </button>
            </span>
          </label>
        </div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="./js/grid-toolbar.js?v=20260716-filtering-toggle-v1"></script>
    <script src="../dist/fabui.min.js?v=20260713-jquery-wrapper-v1"></script>
    <script src="../dist/wrapper/fabgrid-jquery.min.js?v=20260713-wrapper-dist-v1"></script>
    <script src="./js/grid-data.js?v=20260715-remove-currency-v1"></script>
    <script src="./js/grid-locales.js?v=20260716-filtering-toggle-v1"></script>
    <script src="./js/grid-query.js?v=20260715-grid-names-v1"></script>
    <script src="./js/grid-jquery.js?v=20260715-grid-names-v1"></script>
    <script src="./js/grid.js?v=20260718-lunar-default-off-v1"></script>
  </body>
</html>
