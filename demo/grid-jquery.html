<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FabGrid jQuery Grid Demo</title>
    <link
      rel="stylesheet"
      href="../dist/fabui.css?v=20260722-theme-css-split-v1"
    />
  <script src="./js/theme-loader.js?v=20260722-theme-reload-v1"></script>
    <link
      rel="stylesheet"
      href="./style/my.icon.css?v=20260713-demo-style-folder-v1"
    />
    <link
      rel="stylesheet"
      href="./style/style.css?v=20260719-style-isolation-v1"
    />
  </head>
  <body class="fg-theme-default">
    <main class="page">
      <section
        data-fabgrid-demo-toolbar
        data-toolbar-title="FabGrid jQuery"
        data-toolbar-description="jQuery wrapper"
      ></section>

      <section class="stats" aria-label="FabGrid stats">
        <span id="rowCount">Rows: -</span>
        <span id="rowRange">Rows visible: -</span>
        <span id="columnRange">Columns visible: -</span>
        <span id="cellCount">Rendered cells: -</span>
      </section>

      <section class="grid-shell">
        <div id="grid"></div>
        <div class="demo-filter-bar" aria-label="Demo filter">
          <span id="demoResultCount" class="demo-result-count">筆數: -</span>
          <label class="demo-filter-control">
            <span id="demoFilterLabel">篩選:</span>
            <span class="demo-filter-input-wrap">
              <input
                id="demoFilterInput"
                type="search"
                placeholder="輸入條件"
                autocomplete="off"
              />
              <a
                id="demoFilterMode"
                class="demo-filter-mode"
                aria-label="OR"
                title="OR"
               href="javascript:void(0)">
                OR
              </a>
              <a
                id="demoFilterClear"
                aria-label="清除篩選"
                title="清除篩選"
               href="javascript:void(0)">
                🧹
              </a>
            </span>
          </label>
        </div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="./js/grid-toolbar.js?v=20260722-filter-mode-v1"></script>
    <script src="../dist/fabui.min.js?v=20260721-mono-theme-v2"></script>
    <script src="../dist/wrapper/fabgrid-jquery.min.js?v=20260713-wrapper-dist-v1"></script>
    <script src="./js/grid-data.js?v=20260721-mono-variants-v1"></script>
    <script src="./js/grid-locales.js?v=20260721-mono-variants-v1"></script>
    <script src="./js/grid-query.js?v=20260722-remote-op-symbol-v1"></script>
    <script src="./js/grid-jquery.js?v=20260722-filter-mode-v1"></script>
    <script src="./js/grid.js?v=20260722-search-delay-400-v1"></script>
    <script type="module" src="./js/dist-controls.js?v=20260721-mono-variants-v1"></script>
</body>
</html>
