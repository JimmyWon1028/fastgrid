<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FabGrid Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css?v=20260711-fabui-bundle-v1">
  <link rel="stylesheet" href="./my.icon.css?v=20260711-demo-icons-v1">
  <link rel="stylesheet" href="./style.css?v=20260711-fabgrid-only-v3">
</head>
<body>
  <main class="page">
    <section class="toolbar" aria-label="FabGrid controls">
      <div class="brand">
        <h1>FabGrid</h1>
        <p>Pure JS performance-first grid · <span id="datasetSummary">-</span></p>
      </div>
      <label class="field compact">
        <span id="languageLabel">語言</span>
        <select id="languageInput">
          <option value="zh-TW">繁體中文</option>
          <option value="zh-CN">简体中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <label class="field compact theme-field">
        <span id="themeLabel">主題</span>
        <select id="themeInput"></select>
      </label>
      <label class="field compact narrow-number-field">
        <span id="frozenLabel">凍結欄</span>
        <input id="frozenInput" type="number" min="0" max="6" value="2">
      </label>
      <label class="field compact narrow-number-field">
        <span id="frozenRightLabel">右凍結欄</span>
        <input id="frozenRightInput" type="number" min="0" max="6" value="1">
      </label>
      <label class="field compact">
        <span id="rowHeadersLabel">列號</span>
        <select id="rowHeadersInput">
          <option value="false">關閉</option>
          <option value="true">顯示列號</option>
          <option value="cell">只顯示 cell</option>
        </select>
      </label>
      <label class="field compact">
        <span id="groupRowsLabel">群組</span>
        <select id="groupRowsInput">
          <option value="none">沒有群組</option>
          <option value="order">訂單編號</option>
          <option value="vendor">主要廠商 + 訂單編號</option>
          <option value="vendor-order">主要廠商 > 訂單編號</option>
        </select>
      </label>
      <label class="toggle">
        <input id="searchRowInput" type="checkbox">
        <span id="searchRowLabel">搜尋列</span>
      </label>
      <label class="toggle">
        <input id="paginationInput" type="checkbox">
        <span id="paginationLabel">分頁</span>
      </label>
      <label class="toggle">
        <input id="remoteInput" type="checkbox">
        <span id="remoteLabel">遠端</span>
      </label>
      <label class="toggle">
        <input id="multiSelectInput" type="checkbox">
        <span id="multiSelectLabel">多選</span>
      </label>
      <label class="toggle">
        <input id="editModeInput" type="checkbox">
        <span id="editModeLabel">編輯</span>
      </label>
      <button id="exportButton" class="toolbar-icon-button icon-export" type="button" aria-label="匯出 CSV" title="匯出 CSV"></button>
      <button id="exportExcelButton" class="toolbar-icon-button icon-excel" type="button" aria-label="匯出 Excel" title="匯出 Excel"></button>
    </section>

    <section class="stats" aria-label="FabGrid stats">
      <span id="rowCount">Rows: -</span>
      <span id="rowRange">Rows visible: -</span>
      <span id="columnRange">Columns visible: -</span>
      <span id="cellCount">Rendered cells: -</span>
    </section>

    <section class="grid-shell">
      <div id="grid"></div>
      <div class="demo-filter-bar" aria-label="Demo filter">
        <span id="demoResultCount" class="demo-result-count">筆數: -</span>
        <label class="demo-filter-control">
          <span id="demoFilterLabel">篩選:</span>
          <span class="demo-filter-input-wrap">
            <input id="demoFilterInput" type="search" placeholder="輸入條件" autocomplete="off">
            <button id="demoFilterMode" class="demo-filter-mode" type="button" aria-label="OR" title="OR">OR</button>
            <button id="demoFilterClear" type="button" aria-label="清除篩選" title="清除篩選">🧹</button>
          </span>
        </label>
      </div>
    </section>
  </main>

  <script src="../dist/fabui.min.js?v=20260712-download-blob-v1"></script>
  <script src="./demo.js?v=20260712-remove-xls-v3"></script>
</body>
</html>
