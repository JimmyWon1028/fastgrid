<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FabGrid Demo</title>
    <link
      rel="stylesheet"
      href="../dist/fabui.css?v=20260711-fabui-bundle-v1"
    />
    <link
      rel="stylesheet"
      href="./style/my.icon.css?v=20260713-demo-style-folder-v1"
    />
    <link
      rel="stylesheet"
      href="./style/style.css?v=20260714-grid-fullscreen-v1"
    />
  </head>
  <body>
    <main class="page">
      <section data-fabgrid-demo-toolbar></section>

      <section class="stats" aria-label="FabGrid stats">
        <span id="rowCount">Rows: -</span>
        <span id="rowRange">Rows visible: -</span>
        <span id="columnRange">Columns visible: -</span>
        <span id="cellCount">Rendered cells: -</span>
      </section>

      <section class="grid-shell">
        <div id="grid"></div>
        <div class="demo-filter-bar" aria-label="Demo filter">
          <span id="demoResultCount" class="demo-result-count">筆數: -</span>
          <label class="demo-filter-control">
            <span id="demoFilterLabel">篩選:</span>
            <span class="demo-filter-input-wrap">
              <input
                id="demoFilterInput"
                type="search"
                placeholder="輸入條件"
                autocomplete="off"
              />
              <button
                id="demoFilterMode"
                class="demo-filter-mode"
                type="button"
                aria-label="OR"
                title="OR"
              >
                OR
              </button>
              <button
                id="demoFilterClear"
                type="button"
                aria-label="清除篩選"
                title="清除篩選"
              >
                🧹
              </button>
            </span>
          </label>
        </div>
      </section>
    </main>

    <script src="../dist/fabui.min.js?v=20260712-download-blob-v1"></script>
    <script src="./js/demo-toolbar.js?v=20260714-demo-shared-toolbar-v1"></script>
    <script src="./js/demo-data.js?v=20260714-demo-shared-lookup-v1"></script>
    <script src="./js/demo-locales.js?v=20260714-grid-fullscreen-v1"></script>
    <script src="./js/demo-query.js?v=20260714-demo-shared-query-v1"></script>
    <script src="./js/demo.js?v=20260714-demo-jquery-adapter-v1"></script>
  </body>
</html>
