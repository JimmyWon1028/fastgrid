<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.PropertyGrid Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css">
  <style>
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      background: var(--fg-cell-bg, #fff);
      color: var(--fg-cell-text, #333);
      font: 14px Arial, sans-serif;
    }
    h1 { margin: 0 0 8px; }
    .demo-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin: 18px 0; padding: 12px; border: 1px solid var(--fg-border, #ddd); background: var(--fg-header-bg, #fafafa); }
    .propertygrid-stage { max-width: 620px; }
    #propertygrid-status { min-height: 20px; margin: 12px 0; color: var(--fg-muted-text, #666); }
    .propertygrid-group-count { color: var(--fg-muted-text, #777); font-weight: 400; }
    .propertygrid-color-dot { display: inline-block; width: 13px; height: 13px; margin-right: 7px; border: 1px solid var(--fg-border, #999); vertical-align: -2px; }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.PropertyGrid Demo</h1>
  <p>參考 jQuery EasyUI PropertyGrid／Default theme；點擊 Value 欄即可編輯，並支援群組、欄位排序、變更追蹤、遠端資料與三語系。</p>
  <div class="demo-toolbar">
    <label for="propertygrid-theme">主題</label>
    <select id="propertygrid-theme">
      <option value="default" selected>Default</option><option value="bootstrap">Bootstrap</option><option value="cupertino">Cupertino</option>
      <option value="material">Material</option><option value="material-blue">Material Blue</option><option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option><option value="metro-blue">Metro Blue</option><option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option><option value="metro-orange">Metro Orange</option><option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option><option value="pepper-grinder">Pepper Grinder</option><option value="dark-hive">Dark Hive</option><option value="black">Black</option>
    </select>
    <label for="propertygrid-locale">語系</label>
    <select id="propertygrid-locale"><option value="zh-TW" selected>繁體中文</option><option value="zh-CN">簡體中文</option><option value="en">English</option></select>
    <a id="propertygrid-group" href="javascript:void(0)"></a><a id="propertygrid-header" href="javascript:void(0)"></a>
    <a id="propertygrid-expand" href="javascript:void(0)">全部展開</a><a id="propertygrid-collapse" href="javascript:void(0)">全部收合</a>
    <a id="propertygrid-changes" href="javascript:void(0)">取得異動</a><a id="propertygrid-accept" href="javascript:void(0)">接受</a><a id="propertygrid-reject" href="javascript:void(0)">還原</a>
  </div>
  <div id="propertygrid-status" aria-live="polite"></div>
  <div class="propertygrid-stage"><div id="propertygrid-basic"></div></div>
  <script src="../dist/fabui.min.js"></script>
  <script src="./js/propertygrid-demo.js?v=20260719-propertygrid-v1"></script>
  <script>
    window.mountFabUIPropertyGridDemo(window.fabui);
  </script>
  <script type="module" src="./js/dist-controls.js?v=20260719-all-demos-v1"></script>
</body>
</html>
