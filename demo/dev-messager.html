<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Messager 開發版 Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260718-messager-v3">
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      background: #fff;
      color: #333;
      font: 14px Arial, sans-serif;
    }
    h1 { margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; font-size: 18px; }
    .demo-toolbar,
    .messager-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .demo-toolbar {
      margin: 18px 0;
      padding: 12px;
      border: 1px solid #ddd;
      background: #fafafa;
    }
    .messager-row button {
      min-width: 92px;
      min-height: 30px;
      padding: 4px 10px;
    }
    #messager-status {
      min-height: 20px;
      margin: 12px 0;
      color: #666;
    }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Messager 開發版 Demo</h1>
  <p>Pure JavaScript Messager，重用 fabui.Window 與 fabui.Button，支援 alert、confirm、prompt、toast 與 progress。</p>

  <div class="demo-toolbar">
    <label for="messager-theme">主題</label>
    <select id="messager-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
    </select>
    <label for="messager-locale">語系</label>
    <select id="messager-locale">
      <option value="zh-TW" selected>繁體中文</option>
      <option value="zh-CN">简体中文</option>
      <option value="en">English</option>
    </select>
    <button id="messager-close-all" type="button">關閉全部</button>
  </div>
  <div id="messager-status" aria-live="polite"></div>

  <h2>Alert Messager</h2>
  <div class="messager-row">
    <button id="messager-alert" type="button">Alert</button>
    <button id="messager-error" type="button">Error</button>
    <button id="messager-info" type="button">Info</button>
    <button id="messager-question" type="button">Question</button>
    <button id="messager-warning" type="button">Warning</button>
  </div>

  <h2>Interactive Messager</h2>
  <div class="messager-row">
    <button id="messager-confirm" type="button">Confirm</button>
    <button id="messager-prompt" type="button">Prompt</button>
  </div>

  <h2>Toast／Progress</h2>
  <div class="messager-row">
    <button id="messager-show" type="button">Show</button>
    <button id="messager-slide" type="button">Slide</button>
    <button id="messager-fade" type="button">Fade</button>
    <button id="messager-progress" type="button">Progress</button>
  </div>

  <script src="./js/messager-demo.js?v=20260718-messager-v3"></script>
  <script type="module">
    import fabui from '../src/fabui.js?v=20260718-messager-v3';
    window.mountFabUIMessagerDemo(fabui);
  </script>
</body>
</html>
