<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Scheduler 開發版 Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260721-initial-filter-rules-v1">
  <link rel="stylesheet" href="../src/fabui.scheduler.css?v=20260721-initial-filter-rules-v1">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: grid;
      padding: 10px;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 8px;
      background: #f5f6f8;
      color: #333;
      font: 14px Arial, sans-serif;
    }

    .demo-toolbar {
      display: flex;
      padding: 8px;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid #ddd;
      background: #fff;
    }

    #scheduler-status {
      min-height: 20px;
      margin: 0;
    }

    #scheduler {
      min-height: 0;
    }
  </style>
</head>
<body class="fg-theme-default">
  <div class="demo-toolbar">
    <strong>fabui.Scheduler 開發版</strong>
    <label for="scheduler-theme">主題</label>
    <select id="scheduler-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
      <option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <label for="scheduler-locale">語系</label>
    <select id="scheduler-locale">
      <option value="zh-TW" selected>繁體中文</option>
      <option value="zh-CN">简体中文</option>
      <option value="en">English</option>
    </select>
    <a id="scheduler-add" data-fabui-button href="javascript:void(0)" data-icon-cls="icon-add">新增行程</a>
  </div>
  <p id="scheduler-status" aria-live="polite"></p>
  <div id="scheduler"></div>

  <script src="./js/scheduler-demo.js?v=20260721-initial-filter-rules-v1"></script>
  <script type="module">
    import fabui from '../src/fabui.scheduler.js?v=20260721-initial-filter-rules-v1';

    window.mountFabUISchedulerDemo(fabui);
  </script>
  <script type="module" src="./js/dev-controls.js?v=20260721-initial-filter-rules-v1"></script>
</body>
</html>
