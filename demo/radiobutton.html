<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.RadioButton Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css">
  <style>
    body { max-width: 900px; margin: 0 auto; padding: 28px 20px 48px; background: var(--fg-cell-bg, #fff); color: var(--fg-cell-text, #333); font: 14px Arial, sans-serif; }
    h1 { margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; font-size: 18px; }
    .demo-toolbar, .radiobutton-row, .radiobutton-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; }
    .demo-toolbar { gap: 8px; margin: 18px 0; padding: 12px; border: 1px solid var(--fg-border, #ddd); background: var(--fg-header-bg, #fafafa); }
    .radiobutton-panel { max-width: 640px; padding: 18px; border: 1px solid var(--fg-border, #ddd); background: var(--fg-cell-bg, #fff); }
    .radiobutton-column { display: grid; gap: 14px; }
    #radiobutton-status { min-height: 20px; margin: 12px 0; color: var(--fg-muted-text, #666); }
    .radiobutton-actions { margin-top: 16px; gap: 8px; }
  </style>
</head>
<body class="fg-theme-default radiobutton-demo">
  <h1>fabui.RadioButton Demo</h1>
  <p>參考 jQuery EasyUI RadioButton，使用原生 radio 保留表單、label、鍵盤與 reset 行為。</p>
  <div class="demo-toolbar">
    <label for="radiobutton-theme">主題</label>
    <select id="radiobutton-theme">
      <option value="default" selected>Default</option><option value="bootstrap">Bootstrap</option><option value="cupertino">Cupertino</option>
      <option value="material">Material</option><option value="material-blue">Material Blue</option><option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option><option value="metro-blue">Metro Blue</option><option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option><option value="metro-orange">Metro Orange</option><option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option><option value="pepper-grinder">Pepper Grinder</option><option value="dark-hive">Dark Hive</option><option value="black">Black</option>
    </select>
    <label for="radiobutton-locale">語系</label>
    <select id="radiobutton-locale"><option value="zh-TW" selected>繁體中文</option><option value="zh-CN">簡體中文</option><option value="en">English</option></select>
  </div>
  <div id="radiobutton-status" aria-live="polite"></div>
  <form id="radiobutton-form">
    <h2>Basic／Form Values</h2>
    <div class="radiobutton-panel radiobutton-column">
      <input id="radiobutton-apple" type="radio" name="fruit"><input id="radiobutton-orange" type="radio" name="fruit"><input id="radiobutton-banana" type="radio" name="fruit">
      <div class="radiobutton-actions"><a data-fabui-button href="javascript:void(0)" data-button-type="submit">檢查 FormData</a><a data-fabui-button id="radiobutton-reset" href="javascript:void(0)">Reset</a></div>
    </div>
    <h2>Label Position</h2>
    <div class="radiobutton-panel radiobutton-row">
      <input id="radiobutton-before" type="radio" name="position"><input id="radiobutton-after" type="radio" name="position"><input id="radiobutton-top" type="radio" name="position">
    </div>
    <h2>Disabled／Runtime API</h2>
    <div class="radiobutton-panel">
      <div class="radiobutton-row"><input id="radiobutton-disabled" type="radio" name="runtime"><input id="radiobutton-dynamic" type="radio" name="runtime"></div>
      <div class="radiobutton-actions"><a data-fabui-button id="radiobutton-check" href="javascript:void(0)">Check</a><a data-fabui-button id="radiobutton-clear" href="javascript:void(0)">Clear</a><a data-fabui-button id="radiobutton-toggle" href="javascript:void(0)">Enable／Disable</a></div>
    </div>
  </form>
  <script src="../dist/fabui.min.js"></script>
  <script src="./js/radiobutton-demo.js?v=20260719-button-anchor-v1"></script>
  <script>
    window.mountFabUIRadioButtonDemo(window.fabui);
  </script>
  <script type="module" src="./js/dist-controls.js?v=20260719-all-demos-v1"></script>
</body>
</html>
