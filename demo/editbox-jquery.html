<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EditBox jQuery 正式版 Demo</title>
  <link rel="stylesheet" href="../dist/editbox.css">
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .intro {
      margin: 0 0 24px;
      color: #666;
    }

    .form-row {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      align-items: center;
      margin-bottom: 14px;
    }

    .actions {
      margin: 22px 0;
    }

    .actions button {
      margin-right: 8px;
      padding: 7px 14px;
    }

    pre {
      min-height: 110px;
      padding: 14px;
      border-radius: 5px;
      background: #f5f7f9;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>EditBox jQuery 正式版 Demo</h1>
  <p class="intro">使用 <code>$.fn.fabeditbox</code> 建立並操作 EditBox。</p>

  <div class="form-row"><label for="edit-name">文字</label><input class="editbox-jquery-input fab-editbox" id="edit-name" value="王小明" data-options="editor:'text',iconCls:'icon-search'" style="width:300px"></div>
  <div class="form-row"><label for="edit-amount">數字</label><input class="editbox-jquery-input" id="edit-amount" value="1280.5"></div>
  <div class="form-row"><label for="edit-date">日期</label><input class="editbox-jquery-input" id="edit-date" value="2026/07/17"></div>
  <div class="form-row"><label for="edit-status">清單</label><input class="editbox-jquery-input" id="edit-status" value="active"></div>
  <div class="form-row"><label for="edit-color">顏色</label><input class="editbox-jquery-input" id="edit-color" value="teal"></div>

  <div class="actions">
    <button id="clear-all" type="button">全部清除</button>
    <button id="reset-all" type="button">還原初始值</button>
  </div>

  <pre id="editbox-jquery-output" aria-live="polite"></pre>

  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <script src="../dist/editbox.min.js"></script>
  <script src="../dist/wrapper/fabeditbox-jquery.min.js"></script>
  <script src="./js/editbox-jquery-demo.js"></script>
  <script>
    window.fabuiEditBoxJQuery.parse(document);
    window.mountFabEditBoxJQueryDemo(window.jQuery);
  </script>
</body>
</html>
