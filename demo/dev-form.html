<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Form 開發版 Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260721-initial-filter-rules-v1">
  <style>
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      background: var(--fg-cell-bg, #fff);
      color: var(--fg-cell-text, #333);
      font: 14px Arial, sans-serif;
    }

    h1 {
      margin: 0 0 8px;
    }

    .demo-toolbar,
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .demo-toolbar {
      margin: 18px 0;
      padding: 12px;
      border: 1px solid var(--fg-border, #ddd);
      background: var(--fg-header-bg, #fafafa);
    }

    .form-panel {
      max-width: 560px;
      padding: 28px;
      border: 1px solid var(--fg-border, #ddd);
      background: var(--fg-cell-bg, #fff);
    }

    .form-row {
      margin-bottom: 16px;
    }

    .form-row > label {
      display: block;
      margin-bottom: 6px;
    }

    .form-row select {
      width: 100%;
      height: 32px;
      border: 1px solid var(--fg-border, #aaa);
      background: var(--fg-cell-bg, #fff);
      color: var(--fg-cell-text, #333);
    }

    .form-actions {
      margin-top: 22px;
    }

    #form-status {
      min-height: 20px;
      margin: 12px 0;
      color: var(--fg-muted-text, #666);
    }

    #form-status.demo-error {
      color: #cc0000;
    }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Form 開發版 Demo</h1>
  <p>參考 jQuery EasyUI Form，展示本機／遠端 load、constraint validation、Ajax submit、clear、reset 與 dirty tracking。</p>

  <div class="demo-toolbar">
    <label for="form-theme">主題</label>
    <select id="form-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
      <option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <a data-fabui-button href="javascript:void(0)" id="form-validation">Disable Validation</a>
    <a data-fabui-button href="javascript:void(0)" id="form-reset-dirty">Reset Dirty</a>
  </div>
  <div id="form-status" aria-live="polite"></div>

  <div class="form-panel">
    <form id="contact-form" method="get" action="./data/form-submit.json">
      <div class="form-row">
        <input id="form-name" name="name" required>
      </div>
      <div class="form-row">
        <input id="form-email" type="email" name="email" required>
      </div>
      <div class="form-row">
        <input id="form-subject" name="subject">
      </div>
      <div class="form-row">
        <textarea id="form-message" name="message"></textarea>
      </div>
      <div class="form-row">
        <label for="form-language">Language:</label>
        <select id="form-language" name="language">
          <option value="">請選擇</option>
          <option value="zh-TW">繁體中文</option>
          <option value="zh-CN">簡體中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="form-row">
        <input id="form-newsletter" type="checkbox" name="newsletter" value="yes">
      </div>
      <div class="form-actions">
        <a data-fabui-button href="javascript:void(0)" id="form-load-local">Load Local</a>
        <a data-fabui-button href="javascript:void(0)" id="form-load-remote">Load Remote</a>
        <a data-fabui-button href="javascript:void(0)" id="form-clear">Clear</a>
        <a data-fabui-button href="javascript:void(0)" id="form-reset">Reset</a>
        <a data-fabui-button href="javascript:void(0)" id="form-submit" data-button-type="submit">Submit</a>
      </div>
    </form>
  </div>

  <script src="./js/form-demo.js?v=20260721-initial-filter-rules-v1"></script>
  <script type="module">
    import fabui from '../src/fabui.js?v=20260721-initial-filter-rules-v1';

    window.mountFabUIFormDemo(fabui);
  </script>
  <script type="module" src="./js/dev-controls.js?v=20260721-initial-filter-rules-v1"></script>
</body>
</html>
