<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Calendar 開發版 Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260718-tabs-v1">
  <style>
    body {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      background: #fff;
      color: #333;
      font: 14px Arial, sans-serif;
    }

    h1 {
      margin: 0 0 8px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .demo-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 18px 0;
      padding: 12px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      align-items: start;
    }

    .calendar-card {
      min-width: 0;
    }

    .calendar-card-wide {
      grid-column: 1 / -1;
    }

    .calendar-fluid-host {
      height: 300px;
    }

    #calendar-status {
      min-height: 20px;
      color: #666;
    }

    .calendar-demo-holiday .fui-calendar-day {
      color: #d33;
    }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Calendar 開發版 Demo</h1>
  <p>Pure JavaScript Calendar，參考 EasyUI Calendar，並與 Date EditBox／FabGrid 共用 DatePopup 日曆核心與主題樣式。</p>

  <div class="demo-toolbar">
    <label for="calendar-theme">主題</label>
    <select id="calendar-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
    </select>
    <label for="calendar-locale">語系</label>
    <select id="calendar-locale">
      <option value="zh-TW" selected>繁體中文</option>
      <option value="zh-CN">簡體中文</option>
      <option value="en">English</option>
    </select>
    <button id="calendar-today" type="button">移至今天</button>
    <button id="calendar-july" type="button">移至 2026-07-18</button>
  </div>
  <div id="calendar-status" aria-live="polite"></div>

  <div class="calendar-grid">
    <section class="calendar-card">
      <h2>Basic Calendar</h2>
      <div id="calendar-basic"></div>
    </section>

    <section class="calendar-card">
      <h2>Week Number</h2>
      <div id="calendar-week"></div>
    </section>

    <section class="calendar-card">
      <h2>Formatter／Styler／Validator</h2>
      <div id="calendar-custom"></div>
    </section>

    <section class="calendar-card calendar-card-wide">
      <h2>農民曆（預設關閉，明確設定 showLunar）</h2>
      <div id="calendar-lunar"></div>
    </section>

    <section class="calendar-card calendar-card-wide">
      <h2>Fluid Calendar</h2>
      <div class="calendar-fluid-host">
        <div id="calendar-fluid"></div>
      </div>
    </section>
  </div>

  <script src="./js/calendar-demo.js?v=20260718-tabs-v1"></script>
  <script type="module">
    import fabui from '../src/fabui.js?v=20260718-final-audit-v1';

    window.mountFabUICalendarDemo(fabui);
  </script>
</body>
</html>
