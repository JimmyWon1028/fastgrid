<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Tooltip Build Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css">
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      background: #fff;
      color: #333;
      font: 14px Arial, sans-serif;
    }

    h1 { margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; font-size: 18px; }

    .demo-toolbar,
    .tooltip-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .demo-toolbar {
      margin: 18px 0;
      padding: 12px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    .tooltip-target {
      min-width: 110px;
      padding: 9px 14px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      color: #333;
      text-align: center;
      cursor: pointer;
    }

    #tooltip-track {
      display: flex;
      width: 100%;
      height: 150px;
      align-items: center;
      justify-content: center;
      border: 1px dashed #95B8E7;
      background: #f8fbff;
    }

    #tooltip-status {
      min-height: 20px;
      margin: 12px 0;
      color: #666;
    }

    #tooltip-manual-host {
      width: max-content;
      max-width: 100%;
    }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Tooltip Build Demo</h1>
  <p>只載入 <code>dist/fabui.min.js</code> 與 <code>dist/fabui.css</code>。</p>

  <div class="demo-toolbar">
    <label for="tooltip-theme">主題</label>
    <select id="tooltip-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
    </select>
  </div>
  <div id="tooltip-status" aria-live="polite"></div>

  <h2>Basic／Position</h2>
  <div class="tooltip-row">
    <button id="tooltip-basic" class="tooltip-target" type="button" title="由 title attribute 建立的 Tooltip">Basic</button>
    <button id="tooltip-top" class="tooltip-target" type="button">Top</button>
    <button id="tooltip-bottom" class="tooltip-target" type="button">Bottom</button>
    <button id="tooltip-left" class="tooltip-target" type="button">Left</button>
    <button id="tooltip-right" class="tooltip-target" type="button">Right</button>
  </div>

  <h2>HTML／Click</h2>
  <div class="tooltip-row">
    <button id="tooltip-html" class="tooltip-target" type="button">HTML Content</button>
    <button id="tooltip-click" class="tooltip-target" type="button">Click Tooltip</button>
  </div>

  <h2>Track Mouse</h2>
  <div id="tooltip-track" tabindex="0">將滑鼠移到這個區域</div>

  <h2>Methods</h2>
  <div id="tooltip-manual-host" class="tooltip-row">
    <button class="tooltip-target" type="button">Manual Target</button>
    <button id="tooltip-show" type="button">show()</button>
    <button id="tooltip-update" type="button">update()</button>
    <button id="tooltip-hide" type="button">hide()</button>
  </div>

  <script src="../dist/fabui.min.js"></script>
  <script src="./js/tooltip-demo.js?v=20260718-tooltip-v1"></script>
  <script>
    window.mountFabUITooltipDemo(window.fabui);
  </script>
</body>
</html>
