<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Layout 開發版 Demo</title>
  <link rel="stylesheet" href="../src/fabui.css?v=20260722-filter-icon-clear-v1">
  <script src="./js/theme-loader.js?v=20260722-theme-reload-v1"></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      background: #f5f6f8;
      color: #333;
      font: 14px Arial, sans-serif;
    }

    .demo-toolbar {
      display: flex;
      padding: 10px;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid #ddd;
      background: #fff;
    }

    #layout-status {
      min-height: 20px;
      padding: 4px 10px;
    }

    .layout-stage {
      min-width: 0;
      min-height: 0;
      margin: 0 10px 10px;
    }

    .layout-host {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .region-pad {
      padding: 12px;
    }

    .brand {
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body class="fg-theme-default">
  <div class="demo-toolbar">
    <strong>fabui.Layout</strong>
    <label for="layout-theme">主題</label>
    <select id="layout-theme">
      <option value="default" selected>Default</option>
      <option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option>
      <option value="material">Material</option>
      <option value="material-blue">Material Blue</option>
      <option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option>
      <option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option>
      <option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option>
      <option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option>
      <option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option>
      <option value="black">Black</option>
      <option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <a data-fabui-button href="javascript:void(0)" id="toggle-north">切換 North</a>
    <a data-fabui-button href="javascript:void(0)" id="toggle-south">切換 South</a>
    <a data-fabui-button href="javascript:void(0)" id="toggle-west">切換 West</a>
    <a data-fabui-button href="javascript:void(0)" id="toggle-east">切換 East</a>
    <a data-fabui-button href="javascript:void(0)" id="remove-east">移除／加入 East</a>
  </div>
  <div id="layout-status" aria-live="polite"></div>

  <div class="layout-stage">
    <div id="demo-layout" class="layout-host">
      <div data-region="north" title="North" class="region-pad">
        <span class="brand">FabUI Layout</span>
      </div>
      <div data-region="south" title="South" class="region-pad">
        South region
      </div>
      <div data-region="west" title="West Navigation" class="region-pad">
        <p>拖曳右側 Splitter 調整寬度。</p>
        <p>按 Header 箭頭可收合。</p>
      </div>
      <div data-region="east" title="East Details" class="region-pad">
        <p>East region 可動態移除與加入。</p>
      </div>
      <div data-region="center" title="Center" class="region-pad">
        <h1>Center Region</h1>
        <p>Center 是必要區域，會自動填滿其餘空間。</p>
        <p>north、south、east、west 都是共用的 <code>fabui.Panel</code> instance。</p>
      </div>
    </div>
  </div>

  <script src="./js/layout-demo.js?v=20260721-initial-filter-rules-v1"></script>
  <script type="module">
    import fabui from '../src/fabui.js?v=20260721-initial-filter-rules-v1';

    window.mountFabUILayoutDemo(fabui);
  </script>
  <script type="module" src="./js/dev-controls.js?v=20260721-initial-filter-rules-v1"></script>
</body>
</html>
