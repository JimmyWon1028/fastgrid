<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FabGrid Vue 2 Grid Demo</title>
  <style>
    .vue-sfc-loading,
    .vue-sfc-error {
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    .vue-sfc-error {
      color: #b42318;
      white-space: pre-wrap;
    }
  </style>
</head>
<body class="fg-theme-default">
  <div id="app">
    <div class="vue-sfc-loading">Loading Vue component...</div>
  </div>
  <script src="../dist/wrapper/vue.min.js"></script>
  <script src="../dist/fabui.min.js"></script>
  <script src="../dist/wrapper/fabgrid-vue.min.js"></script>
  <script src="./js/system.js?v=20260714-systemjs-local-v1"></script>
  <script src="./js/grid-vue2-systemjs.config.js?v=20260715-grid-names-v1"></script>
  <script>
    (function() {
      var componentUrl = './js/grid-vue2.vue?' + Date.now() + '.vue';

      System.import(componentUrl).catch(function(error) {
        var host = document.getElementById('app');
        host.className = 'vue-sfc-error';
        host.textContent = 'Vue component load failed.\n' + (error && error.stack ? error.stack : error);
        console.error(error);
      });
    }());
  </script>
</body>
</html>
