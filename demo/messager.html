<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Messager Build Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css?v=20260722-theme-css-split-v1">
  <script src="./js/theme-loader.js?v=20260722-theme-reload-v1"></script>
  <style>
    * { box-sizing: border-box; }
    body { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; background: #fff; color: #333; font: 14px Arial, sans-serif; }
    h1 { margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; font-size: 18px; }
    .demo-toolbar, .messager-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .demo-toolbar { margin: 18px 0; padding: 12px; border: 1px solid #ddd; background: #fafafa; }
    .messager-row > .fui-button { min-width: 92px; }
    #messager-status { min-height: 20px; margin: 12px 0; color: #666; }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Messager Demo</h1>
  <p>Pure JavaScript Messager，重用 fabui.Window 與 fabui.Button，支援 alert、confirm、prompt、toast 與 progress。</p>
  <div class="demo-toolbar">
    <label for="messager-theme">主題</label>
    <select id="messager-theme">
      <option value="default" selected>Default</option><option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option><option value="material">Material</option>
      <option value="material-blue">Material Blue</option><option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option><option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option><option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option><option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option><option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option><option value="black">Black</option><option value="mono">Mono</option><option value="mono-red">Mono Red</option><option value="mono-green">Mono Green</option>
    </select>
    <label for="messager-locale">語系</label>
    <select id="messager-locale"><option value="zh-TW" selected>繁體中文</option><option value="zh-CN">简体中文</option><option value="en">English</option></select>
    <a id="messager-close-all" href="javascript:void(0)">關閉全部</a>
  </div>
  <div id="messager-status" aria-live="polite"></div>
  <h2>Alert Messager</h2>
  <div class="messager-row">
    <a id="messager-alert" href="javascript:void(0)">Alert</a><a id="messager-error" href="javascript:void(0)">Error</a>
    <a id="messager-info" href="javascript:void(0)">Info</a><a id="messager-question" href="javascript:void(0)">Question</a>
    <a id="messager-warning" href="javascript:void(0)">Warning</a>
  </div>
  <h2>Interactive Messager</h2>
  <div class="messager-row"><a id="messager-confirm" href="javascript:void(0)">Confirm</a><a id="messager-prompt" href="javascript:void(0)">Prompt</a></div>
  <h2>Toast／Progress</h2>
  <div class="messager-row">
    <a id="messager-show" href="javascript:void(0)">Show</a><a id="messager-slide" href="javascript:void(0)">Slide</a>
    <a id="messager-fade" href="javascript:void(0)">Fade</a><a id="messager-progress" href="javascript:void(0)">Progress</a>
  </div>
  <script src="../dist/fabui.min.js"></script>
  <script src="./js/messager-demo.js?v=20260721-mono-variants-v1"></script>
  <script>window.mountFabUIMessagerDemo(window.fabui);</script>
  <script type="module" src="./js/dist-controls.js?v=20260721-mono-variants-v1"></script>
</body>
</html>
