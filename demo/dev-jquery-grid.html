<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FabGrid jQuery Dev Demo</title>
    <link rel="stylesheet" href="../src/fabui.css?v=20260716-cell-range-v2" />
    <link
      rel="stylesheet"
      href="./style/my.icon.css?v=20260713-demo-style-folder-v1"
    />
    <link
      rel="stylesheet"
      href="./style/style.css?v=20260714-grid-fullscreen-v1"
    />
  </head>
  <body>
    <main class="page">
      <section
        data-fabgrid-demo-toolbar
        data-toolbar-title="FabGrid jQuery"
        data-toolbar-description="jQuery wrapper"
      ></section>

      <section class="stats" aria-label="FabGrid stats">
        <span id="rowCount">Rows: -</span>
        <span id="rowRange">Rows visible: -</span>
        <span id="columnRange">Columns visible: -</span>
        <span id="cellCount">Rendered cells: -</span>
      </section>

      <section class="grid-shell">
        <div id="grid"></div>
        <div class="demo-filter-bar" aria-label="Demo filter">
          <span id="demoResultCount" class="demo-result-count">筆數: -</span>
          <label class="demo-filter-control">
            <span id="demoFilterLabel">篩選:</span>
            <span class="demo-filter-input-wrap">
              <input
                id="demoFilterInput"
                type="search"
                placeholder="輸入條件"
                autocomplete="off"
              />
              <button
                id="demoFilterMode"
                class="demo-filter-mode"
                type="button"
                aria-label="OR"
                title="OR"
              >
                OR
              </button>
              <button
                id="demoFilterClear"
                type="button"
                aria-label="清除篩選"
                title="清除篩選"
              >
                🧹
              </button>
            </span>
          </label>
        </div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="./js/grid-toolbar.js?v=20260716-filtering-toggle-v1"></script>
    <script src="./js/grid-data.js?v=20260715-remove-currency-v1"></script>
    <script src="./js/grid-locales.js?v=20260716-filtering-toggle-v1"></script>
    <script src="./js/grid-query.js?v=20260715-grid-names-v1"></script>
    <script type="module">
      import fabui from "../src/fabui.js?v=20260717-pivot-workspace-v2";
      import { createFabGridJQuery } from "../packages/fabgrid-jquery/src/fabgrid-jquery.js?v=20260715-row-header-width-v1";

      window.fabui = fabui;
      createFabGridJQuery(window.jQuery, fabui);
      await import("./js/grid-jquery.js?v=20260715-grid-names-v1");
      await import(
        "../src/locales/fabgrid-locale.zh-TW.js?v=20260716-excel-filter-escape-v1"
      );
      await import(
        "../src/locales/fabgrid-locale.zh-CN.js?v=20260716-excel-filter-escape-v1"
      );
      await import(
        "../src/locales/fabgrid-locale.en.js?v=20260716-excel-filter-escape-v1"
      );
      await import("./js/grid.js?v=20260717-editor-names-v1");
    </script>
  </body>
</html>
