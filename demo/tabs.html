<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabui.Tabs 正式版 Demo</title>
  <link rel="stylesheet" href="../dist/fabui.css">
  <style>
    body { max-width:1040px; margin:0 auto; padding:28px 20px 48px; background:#fff; color:#333; font:14px Arial,sans-serif; }
    h1 { margin:0 0 8px; }
    h2 { margin:28px 0 10px; font-size:18px; }
    .demo-toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:18px 0; padding:12px; border:1px solid #ddd; background:#fafafa; }
    #tabs-status { min-height:20px; margin-bottom:12px; color:#666; }
    .tab-content { padding:16px; line-height:1.7; }
    .tabs-overflow-stage { width:430px; max-width:100%; }
  </style>
</head>
<body class="fg-theme-default">
  <h1>fabui.Tabs 正式版 Demo</h1>
  <p>Pure JavaScript Tabs，參考 EasyUI Tabs，支援動態頁籤、位置、工具、overflow、鍵盤、三語系與 FabUI theme。</p>
  <div class="demo-toolbar">
    <label for="tabs-theme">主題</label>
    <select id="tabs-theme">
      <option value="default" selected>Default</option><option value="bootstrap">Bootstrap</option>
      <option value="cupertino">Cupertino</option><option value="material">Material</option>
      <option value="material-blue">Material Blue</option><option value="material-teal">Material Teal</option>
      <option value="metro">Metro</option><option value="metro-blue">Metro Blue</option>
      <option value="metro-gray">Metro Gray</option><option value="metro-green">Metro Green</option>
      <option value="metro-orange">Metro Orange</option><option value="metro-red">Metro Red</option>
      <option value="sunny">Sunny</option><option value="pepper-grinder">Pepper Grinder</option>
      <option value="dark-hive">Dark Hive</option><option value="black">Black</option>
    </select>
    <label for="tabs-locale">語系</label>
    <select id="tabs-locale"><option value="zh-TW" selected>繁體中文</option><option value="zh-CN">簡體中文</option><option value="en">English</option></select>
    <label for="tabs-position">位置</label>
    <select id="tabs-position"><option value="top">Top</option><option value="bottom">Bottom</option><option value="left">Left</option><option value="right">Right</option></select>
    <label for="tabs-style">樣式</label>
    <select id="tabs-style"><option value="default">Default</option><option value="plain">Plain</option><option value="narrow">Narrow</option><option value="pill">Pill</option><option value="justified">Justified</option></select>
    <button id="tabs-add" type="button">新增</button>
    <button id="tabs-close" type="button">關閉目前頁籤</button>
    <button id="tabs-toggle-disabled" type="button">切換報表 Disabled</button>
    <button id="tabs-toggle-header" type="button">顯示／隱藏 Header</button>
  </div>
  <div id="tabs-status" aria-live="polite"></div>
  <div id="tabs-main">
    <div title="首頁" data-icon-cls="icon-window"><div class="tab-content"><h2>首頁</h2><p>同一時間只顯示一個 tab panel。首頁不能關閉。</p></div></div>
    <div title="客戶" data-closable="true" data-icon-cls="icon-search"><div class="tab-content">客戶資料內容。</div></div>
    <div title="報表" data-closable="true" data-icon-cls="icon-excel"><div class="tab-content">報表內容，可用工具列切換 disabled。</div></div>
    <div title="說明" data-closable="true" data-icon-cls="icon-help"><div class="tab-content">支援滑鼠、方向鍵、Home、End 與 Delete 關閉。</div></div>
  </div>
  <h2>Overflow／Scroll Buttons</h2>
  <div class="tabs-overflow-stage"><div id="tabs-overflow"></div></div>
  <script src="../dist/fabui.min.js"></script>
  <script src="./js/tabs-demo.js?v=20260718-tabs-drag-right-v1"></script>
  <script>window.mountFabUITabsDemo(window.fabui);</script>
</body>
</html>
