        var y;
        for (i = 0; i < nodes.length; i += 1) {
          rect = nodes[i].getBoundingClientRect();
          if (rect.top < gutterTop && rect.bottom > rect.top) {
            x = Math.min(Math.max(rect.left + 2, 1), window.innerWidth - 2);
            y = Math.min(Math.max(Math.min(rect.bottom - 1, gutterTop - 1), 1), window.innerHeight - 2);
            if (isTopElement(nodes[i], x, y)) {
              maxBottom = Math.max(maxBottom, Math.min(rect.bottom, gutterTop));
            }
          }
        }
        return Math.round(gutterTop - maxBottom);
      }

      function isTopElement(node, x, y) {
        var top = document.elementFromPoint(x, y);
        return top === node || (top && node.contains(top));
      }

      function measureScrollbarHeight() {
        var scroller = document.querySelector('.fg-body-scroll');
        return scroller.offsetHeight - scroller.clientHeight;
      }

      function measureFooterHeight() {
        var footer = document.querySelector('.fg-footer');
        return footer && window.getComputedStyle(footer).display !== 'none' ? footer.offsetHeight : 0;
      }

      function runLargeExportScrollCheck() {
        var largeGrid = new fabui.FabGrid('#largeGrid', {
          rowHeight: 32,
          headerHeight: 36,
          overscanRows: 8,
          overscanColumns: 3,
          frozenColumns: 2,
          frozenRightColumns: 1,
          showRowHeaders: false,
          showFooter: true,
          footerHeight: 28,
          columns: columns(20),
          itemsSource: rows(20000),
          formatCell: function(args) {
            if (args.column.binding === 'amount' && Number(args.value) > 1000) {
              args.cell.style.color = '#047857';
              args.cell.style.backgroundColor = '#eef6ff';
            }
          }
        });
        var blob = largeGrid.getExcelBlob();
        var scroller = largeGrid.bodyScroll;
        var syncScrollCell = largeGrid.cellLayer.querySelector('.fg-cell[data-row="0"][data-col="2"]');
        var syncWheelEvent;
        var syncWheelIndex;
        for (syncWheelIndex = 0; syncWheelIndex < 4; syncWheelIndex += 1) {
          syncWheelEvent = new WheelEvent('wheel', {
            deltaY: 16,
            bubbles: true,
            cancelable: true
          });
          syncScrollCell.dispatchEvent(syncWheelEvent);
        }
        var syncFrozenCell = largeGrid.frozenLayer.querySelector('.fg-cell[data-row="0"][data-col="0"]');
        var syncFrozenRightCell = largeGrid.frozenRightLayer.querySelector('.fg-cell[data-row="0"][data-col="19"]');
        var syncScrollRect = syncScrollCell ? syncScrollCell.getBoundingClientRect() : null;
        var syncFrozenRect = syncFrozenCell ? syncFrozenCell.getBoundingClientRect() : null;
        var syncFrozenRightRect = syncFrozenRightCell ? syncFrozenRightCell.getBoundingClientRect() : null;
        var fixedPaneWheelSyncWorks = syncScrollRect && syncFrozenRect && syncFrozenRightRect &&
          syncWheelEvent.defaultPrevented &&
          scroller.scrollTop === 64 &&
          Math.abs(syncScrollRect.top - syncFrozenRect.top) <= 1 &&
          Math.abs(syncScrollRect.top - syncFrozenRightRect.top) <= 1 &&
          window.getComputedStyle(largeGrid.frozenLayer).transform !== 'none';
        scroller.scrollTop = 810 * 32;
        largeGrid.handleScroll();
        var immediateScrollRenderWorks = largeGrid.rowRange.start <= 810 &&
          largeGrid.rowRange.end > 810 &&
          largeGrid.cellLayer.querySelectorAll('.fg-cell').length > 0;
        var fastScrollBufferedRowsWorks = largeGrid.rowRange.end >= 870;
        largeGrid.setBusy(true, 'Exporting...');
        var busyOverlayWorks = largeGrid.busy === true &&
          window.getComputedStyle(largeGrid.busyOverlay).display === 'flex' &&
          largeGrid.busyText.textContent === 'Exporting...';
        largeGrid.setBusy(false);
        var busyOverlayClearsWorks = largeGrid.busy === false &&
          window.getComputedStyle(largeGrid.busyOverlay).display === 'none';
        var result = {
          keepsScrollableCells: blob.size > 1000 && largeGrid.cellLayer.querySelectorAll('.fg-cell').length > 0,
          immediateScrollRenderWorks: immediateScrollRenderWorks,
          fastScrollBufferedRowsWorks: fastScrollBufferedRowsWorks,
          fixedPaneWheelSyncWorks: fixedPaneWheelSyncWorks,
          cellCount: largeGrid.cellLayer.querySelectorAll('.fg-cell').length,
          columnRange: largeGrid.columnRange.start + '-' + largeGrid.columnRange.end,
          rowRange: largeGrid.rowRange.start + '-' + largeGrid.rowRange.end,
          busyOverlayWorks: busyOverlayWorks,
          busyOverlayClearsWorks: busyOverlayClearsWorks
        };
        largeGrid.dispose();
        return result;
      }

      function getDataAreaBottom() {
        var body = document.querySelector('.fg-body');
        var bodyRect = body.getBoundingClientRect();
        return bodyRect.bottom - measureScrollbarHeight() - measureFooterHeight();
      }

      function runBindingAndGroupingSafetyCheck() {
        var host = document.createElement('div');
        var prototypeProperty = '__fabgridSafetyCheck';
        var safetyGrid;
        var groupRows;
        var result;
        host.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:400px;height:240px;';
        document.body.appendChild(host);
        safetyGrid = new fabui.FabGrid(host, {
          rowGroups: [{ binding: 'group' }],
          columns: [
            { binding: '__proto__.' + prototypeProperty, header: 'Unsafe' },
            { binding: 'group', header: 'Group' }
          ],
          itemsSource: [
            { group: '__proto__' },
            { group: '__proto__' }
          ]
        });
        result = {
          dangerousBindingBlocked: safetyGrid.setCellData(1, 0, true) === false &&
            Object.prototype[prototypeProperty] === undefined,
          specialGroupKeyWorks: false
        };
        groupRows = safetyGrid.view.filter(function(row) {
          return safetyGrid.isRowGroup(row);
        });
        result.specialGroupKeyWorks = groupRows.length === 1 && groupRows[0].count === 2;
        safetyGrid.dispose();
        host.remove();
        delete Object.prototype[prototypeProperty];
        return result;
      }

      function runHeaderSearchAlignmentCheck() {
        var host = document.createElement('div');
        var searchGrid;
        var input;
        var bodyCell;
        var headerRect;
        var bodyRect;
        var col;
        var i;
        var result;
        host.style.cssText = 'position:absolute;left:-9999px;top:0;width:640px;height:280px;';
        document.body.appendChild(host);
        searchGrid = new fabui.FabGrid(host, {
          showSearchRow: true,
          showRowHeaders: true,
          frozenColumns: 1,
          frozenRightColumns: 1,
          columns: columns(20),
          itemsSource: rows(20)
        });
        input = searchGrid.header.querySelector('.fg-header-search-input[data-col="1"]');
        input.focus();
        for (i = 0; i < 12; i += 1) {
          input = searchGrid.getActiveHeaderSearchInput();
          input.dispatchEvent(new KeyboardEvent('keydown', {
            key: 'Enter',
            bubbles: true,
            cancelable: true
          }));
        }
        return new Promise(function(resolve) {
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              input = searchGrid.getActiveHeaderSearchInput();
              col = input ? input.getAttribute('data-col') : '-1';
              bodyCell = searchGrid.cellLayer.querySelector('.fg-cell[data-col="' + col + '"]');
              headerRect = input ? input.getBoundingClientRect() : null;
              bodyRect = bodyCell ? bodyCell.getBoundingClientRect() : null;
              result = {
                alignmentWorks: headerRect && bodyRect && Math.abs(headerRect.left - bodyRect.left) <= 1,
                containerScrollWorks: searchGrid.headerScroll.scrollLeft === 0
              };
              searchGrid.dispose();
              host.remove();
              resolve(result);
            });
          });
        });
      }

      function runPaginationCheck() {
        var host = document.createElement('div');
        var paginationRows = [];
        var paginationGrid;
        var result;
        var i;
        for (i = 1; i <= 25; i += 1) {
          paginationRows.push({ id: i });
        }
        host.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:400px;height:240px;';
        document.body.appendChild(host);
        paginationGrid = new fabui.FabGrid(host, {
          pagination: true,
          pager: {
            pageNumber: 1,
            pageSize: 10,
            pageList: [10, 20, 50],
            showPageList: false
          },
          columns: [{ binding: 'id', header: 'ID' }],
          itemsSource: paginationRows
        });
        result = {
          initialPageWorks: paginationGrid.view.length === 10 && paginationGrid.paginationTotal === 25,
          lastPageWorks: false,
          pageSizeWorks: false,
          pagerWorks: paginationGrid.getPager() === paginationGrid.pager &&
            paginationGrid.pager.contains(paginationGrid.pagination) &&
            paginationGrid.pagination.querySelector('.fg-pagination-info') !== null
        };
        paginationGrid.setPage(3);
        result.lastPageWorks = paginationGrid.options.pageNumber === 3 &&
          paginationGrid.view.length === 5 && paginationGrid.getCellData(0, 0) === 21;
        paginationGrid.setPageSize(20);
        result.pageSizeWorks = paginationGrid.options.pageNumber === 1 &&
          paginationGrid.options.pageSize === 20 && paginationGrid.view.length === 20;
        paginationGrid.dispose();
        host.remove();
        return result;
      }

      function runRemotePaginationCheck() {
        var host = document.createElement('div');
        var remoteRows = [];
        var requests = [];
        var remoteGrid;
        var result = {
          initialLoadWorks: false,
          secondPageWorks: false,
          requestFormatWorks: false
        };
        var i;
        for (i = 1; i <= 25; i += 1) {
          remoteRows.push({ id: i });
        }
        host.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:400px;height:240px;';
        document.body.appendChild(host);
        remoteGrid = new fabui.FabGrid(host, {
          remote: true,
          pagination: true,
          pager: { pageNumber: 1, pageSize: 10 },
          columns: [{ binding: 'id', header: 'ID' }],
          loader: function(params) {
            var start = (params.page - 1) * params.rows;
            requests.push({ page: params.page, rows: params.rows });
            return Promise.resolve({
              total: String(remoteRows.length),
              rows: remoteRows.slice(start, start + params.rows)
            });
          }
        });
        return remoteGrid.load().then(function() {
          result.initialLoadWorks = remoteGrid.paginationTotal === 25 &&
            remoteGrid.view.length === 10 && remoteGrid.getCellData(0, 0) === 1;
          return remoteGrid.setPage(2);
        }).then(function() {
          result.secondPageWorks = remoteGrid.options.pageNumber === 2 &&
            remoteGrid.view.length === 10 && remoteGrid.getCellData(0, 0) === 11;
          result.requestFormatWorks = requests.some(function(request) {
            return request.page === 2 && request.rows === 10;
          });
          remoteGrid.dispose();
          host.remove();
          return result;
        });
      }

      function readUint16(bytes, offset) {
        return bytes[offset] | (bytes[offset + 1] << 8);
      }

      function readUint32(bytes, offset) {
        return (bytes[offset] | (bytes[offset + 1] << 8) | (bytes[offset + 2] << 16) | (bytes[offset + 3] << 24)) >>> 0;
      }
    }());
  </script>
</body>
