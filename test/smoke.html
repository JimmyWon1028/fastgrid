            binding: 'col' + pad(i),

        var list = [];

          return row instanceof fabui.FabGrid.GroupRow && row instanceof fabui.FabGrid.Row;
        }) && safetyGrid.rows.some(function(row) {
          return row instanceof fabui.FabGrid.Row && !(row instanceof fabui.FabGrid.GroupRow);
        });
        safetyGrid.dispose();
        host.remove();
        delete Object.prototype[prototypeProperty];
        return result;
      }

      function runHeaderSearchAlignmentCheck() {
        var host = document.createElement('div');
        var searchGrid;
        var input;
        var bodyCell;
        var headerRect;
        var bodyRect;
        var col;
        var i;
        var result;
        host.style.cssText = 'position:absolute;left:-9999px;top:0;width:640px;height:280px;';
        document.body.appendChild(host);
        searchGrid = new fabui.FabGrid(host, {
          showSearchRow: true,
          showRowHeaders: true,
          frozenColumns: 1,
          frozenRightColumns: 1,
          columns: columns(20),
          itemsSource: rows(20)
        });
        input = searchGrid.header.querySelector('.fg-header-search-input[data-col="1"]');
        input.focus();
        for (i = 0; i < 12; i += 1) {
          input = searchGrid.getActiveHeaderSearchInput();
          input.dispatchEvent(new KeyboardEvent('keydown', {
            key: 'Enter',
            bubbles: true,
            cancelable: true
          }));
        }
        return new Promise(function(resolve) {
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              input = searchGrid.getActiveHeaderSearchInput();
              col = input ? input.getAttribute('data-col') : '-1';
              bodyCell = searchGrid.cellLayer.querySelector('.fg-cell[data-col="' + col + '"]');
              headerRect = input ? input.getBoundingClientRect() : null;
              bodyRect = bodyCell ? bodyCell.getBoundingClientRect() : null;
              result = {
                alignmentWorks: headerRect && bodyRect && Math.abs(headerRect.left - bodyRect.left) <= 1,
                containerScrollWorks: searchGrid.headerScroll.scrollLeft === 0
              };
              searchGrid.dispose();
              host.remove();
              resolve(result);
            });
          });
        });
      }

      function runPaginationCheck() {
        var host = document.createElement('div');
        var paginationRows = [];
        var paginationGrid;
        var result;
        var i;
        for (i = 1; i <= 25; i += 1) {
          paginationRows.push({ id: i });
        }
        host.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:400px;height:240px;';
        document.body.appendChild(host);
        paginationGrid = new fabui.FabGrid(host, {
          pagination: true,
          pager: {
            pageNumber: 1,
            pageSize: 10,
            pageList: [10, 20, 50],
            showPageList: false
          },
          columns: [{ binding: 'id', header: 'ID' }],
          itemsSource: paginationRows
        });
        result = {
          initialPageWorks: paginationGrid.view.length === 10 && paginationGrid.paginationTotal === 25,
          lastPageWorks: false,
          pageSizeWorks: false,
          pagerWorks: paginationGrid.getPager() === paginationGrid.pager &&
            paginationGrid.pager.contains(paginationGrid.pagination) &&
            paginationGrid.pagination.querySelector('.fg-pagination-info') !== null
        };
        paginationGrid.setPage(3);
        result.lastPageWorks = paginationGrid.options.pageNumber === 3 &&
          paginationGrid.view.length === 5 && paginationGrid.getCellData(0, 0) === 21;
        paginationGrid.setPageSize(20);
        result.pageSizeWorks = paginationGrid.options.pageNumber === 1 &&
          paginationGrid.options.pageSize === 20 && paginationGrid.view.length === 20;
        paginationGrid.dispose();
        host.remove();
        return result;
      }

      function runRemotePaginationCheck() {
        var host = document.createElement('div');
        var remoteRows = [];
        var requests = [];
        var remoteGrid;
        var result = {
          initialLoadWorks: false,
          secondPageWorks: false,
          requestFormatWorks: false
        };
        var i;
        for (i = 1; i <= 25; i += 1) {
          remoteRows.push({ id: i });
        }
        host.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:400px;height:240px;';
        document.body.appendChild(host);
        remoteGrid = new fabui.FabGrid(host, {
          remote: true,
          pagination: true,
          pager: { pageNumber: 1, pageSize: 10 },
          columns: [{ binding: 'id', header: 'ID' }],
          loader: function(params) {
            var start = (params.page - 1) * params.rows;
            requests.push({ page: params.page, rows: params.rows });
            return Promise.resolve({
              total: String(remoteRows.length),
              rows: remoteRows.slice(start, start + params.rows)
            });
          }
        });
        return remoteGrid.load().then(function() {
          result.initialLoadWorks = remoteGrid.paginationTotal === 25 &&
            remoteGrid.view.length === 10 && remoteGrid.getCellData(0, 0) === 1;
          return remoteGrid.setPage(2);
        }).then(function() {
          result.secondPageWorks = remoteGrid.options.pageNumber === 2 &&
            remoteGrid.view.length === 10 && remoteGrid.getCellData(0, 0) === 11;
          result.requestFormatWorks = requests.some(function(request) {
            return request.page === 2 && request.rows === 10;
          });
          remoteGrid.dispose();
          host.remove();
          return result;
        });
      }

      function readUint16(bytes, offset) {
        return bytes[offset] | (bytes[offset + 1] << 8);
      }

      function readUint32(bytes, offset) {
        return (bytes[offset] | (bytes[offset + 1] << 8) | (bytes[offset + 2] << 16) | (bytes[offset + 3] << 24)) >>> 0;
      }
    }());
  </script>
</body>
</html>
