<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../dist/fabui.css">
  <link rel="stylesheet" href="../dist/fabui.scheduler.css">
</head>
<body class="fg-theme-default">
  <div id="scheduler"></div>
  <pre id="result"></pre>
  <script src="../dist/fabui.js"></script>
  <script src="../dist/fabui.scheduler.js"></script>
  <script>
    (function() {
      var date = new Date(2026, 6, 20, 9, 0);
      var scheduler = new fabui.Scheduler('#scheduler', {
        date: date,
        height: 520,
        locale: 'zh-TW',
        currentView: 'week',
        dataSource: [
          {
            id: 1,
            title: 'Planning',
            start: new Date(2026, 6, 20, 9, 0),
            end: new Date(2026, 6, 20, 10, 30)
          },
          {
            id: 2,
            title: 'All day',
            start: new Date(2026, 6, 21),
            end: new Date(2026, 6, 22),
            isAllDay: true
          }
        ]
      });
      var scriptSources = Array.prototype.map.call(
        document.scripts,
        function(script) { return script.src; }
      );
      var coreScriptIndex = scriptSources.findIndex(function(source) {
        return /\/fabui\.js(?:\?|$)/.test(source);
      });
      var schedulerScriptIndex = scriptSources.findIndex(function(source) {
        return /\/fabui\.scheduler\.js(?:\?|$)/.test(source);
      });
      var initialEvents = document.querySelectorAll(
        '#scheduler [data-event-index]'
      ).length;
      scheduler.view('month');
      var monthCells = document.querySelectorAll(
        '#scheduler .fui-scheduler-month-cell'
      ).length;
      scheduler.view('year');
      var yearMonths = document.querySelectorAll(
        '#scheduler .fui-scheduler-year-month'
      ).length;
      scheduler.view('agenda');
      var agendaEvents = document.querySelectorAll(
        '#scheduler .fui-scheduler-event-agenda'
      ).length;
      scheduler.view('timeline');
      var timelineTracks = document.querySelectorAll(
        '#scheduler .fui-scheduler-timeline-track'
      ).length;
      scheduler.addEvent({
        title: 'Added',
        start: new Date(2026, 6, 20, 11, 0),
        end: new Date(2026, 6, 20, 12, 0)
      });
      scheduler.updateEvent(2, { title: 'Updated' });
      scheduler.view('day');
      var result = {
        hasScheduler: typeof fabui.Scheduler === 'function',
        schedulerIsSeparateScript:
          coreScriptIndex >= 0 &&
          schedulerScriptIndex > coreScriptIndex,
        controlLookupWorks: fabui.Control.getControl(
          document.getElementById('scheduler')
        ) === scheduler,
        initialEvents: initialEvents,
        monthCells: monthCells,
        yearMonths: yearMonths,
        agendaEvents: agendaEvents,
        timelineTracks: timelineTracks,
        addUpdateWorks:
          scheduler.dataSource().length === 3 &&
          scheduler.dataSource()[2].title === 'Updated',
        dayViewWorks: document.querySelectorAll(
          '#scheduler .fui-scheduler-time-column'
        ).length === 1,
        localeWorks:
          fabui.Scheduler.normalizeLocale('zh_Hant_TW') === 'zh-TW',
        themeMetadataWorks: fabui.Scheduler.themes.length === 19,
        viewMetadataWorks: fabui.Scheduler.views.length === 7
      };
      document.getElementById('result').textContent = JSON.stringify(result);
    }());
  </script>
</body>
</html>
